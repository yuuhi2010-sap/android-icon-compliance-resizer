name: Feature request
description: Suggest a new icon workflow, validator, or project layout.
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What Android icon workflow is hard today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What should this tool do?
    validations:
      required: true
  - type: textarea
    id: examples
    attributes:
      label: Examples or references
      description: Link official docs, sample projects, screenshots, or preview images.
